# Deploys the minimal test IdP/JWKS auth server used in e2e tests
# It is intentionally HTTP-only; the server is reachable only in-cluster
apiVersion: v1
kind: Namespace
metadata:
  name: auth
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server
  namespace: auth
  labels:
    app.kubernetes.io/name: auth-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-server
    spec:
      containers:
        - name: auth-server
          image: localhost/auth-server:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: false
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
          env:
            # Must match the issuer the egress JWKS middleware expects,
            # and resolvable from within the cluster
            - name: ISSUER_URL
              value: 'http://auth-server.auth.svc.cluster.local:8900'
          ports:
            - name: http
              containerPort: 8900
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
          resources:
            requests:
              memory: 64Mi
              cpu: 100m
            limits:
              memory: 128Mi
              cpu: 200m
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: auth-server
  namespace: auth
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: auth-server
  ports:
    - protocol: TCP
      port: 8900
      targetPort: http
      nodePort: 32002
