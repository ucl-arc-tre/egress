{{- $name := .Release.Name -}}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}-config
  labels:
    "app.kubernetes.io/name": {{ $name }}
type: Opaque
stringData:
  config.yaml: |
    debug: {{ .Values.debug }}
    storage:
      provider: {{ required "storage.provider is required" .Values.storage.provider }}
      {{- if not (has .Values.storage.provider (list "s3" "generic")) }}
      {{- fail (printf "storage.provider must be 's3' or 'generic', got: %s" .Values.storage.provider) }}
      {{- end }}
      {{- if eq .Values.storage.provider "s3" }}
      s3:
        region: {{ required "storage.s3.region is required" .Values.storage.s3.region }}
        access_key_id: {{ required "storage.s3.access_key_id is required" .Values.storage.s3.access_key_id }}
        secret_access_key: {{ required "storage.s3.secret_access_key is required" .Values.storage.s3.secret_access_key }}
      {{- end }}
    db:
      provider: {{ required "db.provider is required" .Values.db.provider }}
      {{- if not (has .Values.db.provider (list "inmemory" "rqlite")) }}
      {{- fail (printf "db.provider must be 'inmemory' or 'rqlite', got: %s" .Values.db.provider) }}
      {{- end }}
      {{- if eq .Values.db.provider "rqlite" }}
      rqlite:
        baseUrl: {{ required "db.rqlite.baseUrl is required" .Values.db.rqlite.baseUrl }}
        username: {{ required "db.rqlite.username is required" .Values.db.rqlite.username }}
        password: {{ required "db.rqlite.password is required" .Values.db.rqlite.password }}
      {{- end }}
    auth:
      basic:
        username: {{ required "username is required" .Values.auth.basic.username }}
        password: {{ required "password is required" .Values.auth.basic.password }}
    {{ if hasKey .Values "dev" }}
    dev:
      {{- toYaml .Values.dev | nindent 6 }}
    {{ end }}
