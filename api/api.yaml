openapi: '3.0.0'
info:
  version: 0.7.0
  title: ucl-arc-tre-egress
  description: UCL ARC TRE Egress API
  license:
    name: BSD-3-Clause
    url: https://opensource.org/license/bsd-3-clause
servers:
  - url: /v0
security:
  - basicAuth: []
paths:
  /{project-id}/files:
    get:
      summary: List requested files
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListFilesRequest'
      responses:
        '200':
          description: Returns requested list of files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{project-id}/files/{file-id}/approve:
    put:
      summary: Approve file
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
        - $ref: '#/components/parameters/FileIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveFileRequest'
      responses:
        '204':
          description: File successfully approved
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{project-id}/files/{file-id}/reject:
    put:
      summary: Reject file
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
        - $ref: '#/components/parameters/FileIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectFileRequest'
      responses:
        '204':
          description: File successfully rejected
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{project-id}/files/{file-id}:
    get:
      summary: Download approved file
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
        - $ref: '#/components/parameters/FileIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadFileRequest'
      responses:
        '200':
          description: File content returned successfully
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /{project-id}/events:
    get:
      summary: List events
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '200':
          description: Returns list of chronologically ordered events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic authentication

  parameters:
    ProjectIdParam:
      name: project-id
      in: path
      required: true
      description: Unique project identifier
      schema:
        type: string

    FileIdParam:
      name: file-id
      in: path
      required: true
      description: Unique file identifier
      schema:
        type: string

  schemas:
    ListFilesRequest:
      type: object
      required:
        - files_location
      properties:
        files_location:
          type: string
          description: Location (i.e. path) of files to list

    FileListResponse:
      type: array
      items:
        $ref: '#/components/schemas/FileMetadata'

    FileMetadata:
      type: object
      required:
        - file_name
        - id
        - size
        - approvals
      properties:
        file_name:
          type: string
          description: Name of file
        id:
          type: string
          description: Unique file identifier
        size:
          type: integer
          description: Size of file in bytes
          minimum: 0
        approvals:
          type: array
          description: List of egress approvals
          items:
            $ref: '#/components/schemas/Approval'

    Approval:
      type: object
      required:
        - user_id
        - destination
        - comment
      properties:
        user_id:
          type: string
          description: User id of approver
        destination:
          type: string
          description: Approved egress destination
        comment:
          type: string
          description: Comment associated with approval

    ApproveFileRequest:
      type: object
      required:
        - user_id
        - destination
      properties:
        user_id:
          type: string
          description: User id of approver
        destination:
          type: string
          description: Destination to which the file can be egressed
        comment:
          type: string
          description: Comment accompanying approval (optional)

    RejectFileRequest:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
          description: User id of rejecter
        comment:
          type: string
          description: Comment accompanying rejection (optional)

    DownloadFileRequest:
      type: object
      required:
        - destination
        - required_approvals
        - files_location
        - max_file_size
      properties:
        destination:
          type: string
          description: Destination to which the file is egressed
        required_approvals:
          type: integer
          description: Min number of approvals required to egress
          minimum: 1
        files_location:
          type: string
          description: Location (i.e. path) of file to egress
        max_file_size:
          type: integer
          description: Maximum allowed file size in bytes
          minimum: 0
        comment:
          type: string
          description: Comment accompanying download request (optional)

    EventListResponse:
      type: array
      items:
        $ref: '#/components/schemas/Event'

    Event:
      type: object
      required:
        - datetime
        - file_id
        - user_id
      properties:
        datetime:
          type: string
          format: date-time
          description: Date and time of event; ISO 8601, millisecond resolution
          example: '2026-04-32T16:48:08.512Z'
        file_id:
          type: string
          description: Unique file identifier
        user_id:
          type: string
          description: User identifier
        action:
          type: string
          nullable: true
          enum:
            - Approval
            - Rejection
            - Download
          description: Action associated with event
        destination:
          type: string
          nullable: true
          description: Egress/download destination
        comment:
          type: string
          nullable: true
          description: Comment associated with approval, rejection or download

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Descriptive error message
          example: 'Invalid file-id parameter'

  responses:
    BadRequest:
      description: Bad request; invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized; authentication required
      headers:
        WWW-Authenticate:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: File not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Unexpected internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
